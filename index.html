<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Segurança Senhas e Dados</title>
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container-master">

        <!--Navbar-->
        <nav class="navbar">
            <div class="container">
                <p>Segurança Digital</p>
                <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
                <i class="bi bi-list text-light fs-4"></i>
                </button>
                <div class="collapse navbar-collapse" id="navMenu">
                    <ul class="navbar-nav ms-auto gap-2 align-items-center">
                    <li class="nav-item"><a class="nav-link" href="#validador">Validador</a></li>
                    <li class="nav-item"><a class="nav-link" href="#dicas">Dicas</a></li>
                    <li class="nav-item ms-2">
                        <button class="theme-toggle" id="themeToggle" title="Alternar tema">
                        <i class="bi bi-moon-stars-fill tt-icon" id="themeIcon"></i>
                        <span id="themeLabel">Dark</span>
                        </button>
                    </li>
                    </ul>
                </div>
            </div>
        </nav>

        <section class="hero">
            <div class="container">
                <h1 class="hero-title">Sua senha é
                    <br><span class="h1">realmente segura?</span>
                </h1>
                <p class="hero-sub">
                    Teste a força da sua senha em tempo real, entenda os critérios de segurança e aprenda a proteger seus dados digitais.
                </p>
                <a href="#validador" class="btn btn-primary px-4 py-2">
                    Testar agora <i class="bi bi-arrow-down ms-1"></i>
                </a>
            </div>

        </section>
    </div>
</body>
</html>
